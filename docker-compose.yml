services:
  db:
    image: leogloriainfnet/postgres-tp2-spring:2.0-mac
    container_name: aventura-db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pg_socket:/var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    image: postgres:17-alpine
    container_name: aventura-db-setup
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pg_socket:/var/run/postgresql
      - ./script/aventura.sql:/script/aventura.sql
    command: >
      sh -c "
        echo 'Iniciando configuracao do banco de dados via UNIX socket...'
        psql -h /var/run/postgresql -U postgres -c \"ALTER USER postgres WITH PASSWORD 'postgres123';\"
        psql -h /var/run/postgresql -U postgres -f /script/aventura.sql
        echo 'Configuracao do banco de dados finalizada com sucesso!'
      "

  redis:
    image: redis:7-alpine
    container_name: aventura-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
  pg_socket:
